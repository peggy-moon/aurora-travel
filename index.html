<!doctype html>
<html>

<head>
    <meta charset="utf-8">
    <title>極光旅行｜AURORA TRAVEL</title>
    <link rel="icon" href="images/logo-icon.png" type="image/x-icon">

    <!-- Google Font(下面這兩句意思是:等等要去 Google Fonts 拿東西，先幫我建立連線吧～) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Marcellus、日本明朝體 -->
    <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Zen+Old+Mincho:wght@400;500;600;700;900&display=swap" rel="stylesheet">

    <!-- icon -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">


    <link href="CSS/tokens.css" rel="stylesheet">
    <link href="CSS/base.css" rel="stylesheet">
    <link href="CSS/typography.css" rel="stylesheet">
    <link href="CSS/layout.css" rel="stylesheet">
    <link href="CSS/components.css" rel="stylesheet">
    <link href="CSS/utilities.css" rel="stylesheet">
    <link href="CSS/home.css" rel="stylesheet">
    <link href="CSS/style.css" rel="stylesheet">



    <!-- 有這句在電腦上預覽手機版網頁才能正常顯示 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>

<body>
    <!-- Hero -->
    <section class="hero">
        <div class="hero__overlay"></div>
        <div class="container hero__content">
            <p class="hero__eyebrow">
                <span>AURORA&nbsp;SEASON&nbsp;2026</span>
                <span class="mobile-break">極光季預售中</span>
            </p>
            
            <h1 class="hero__title">
                追一場&nbsp;<span>極夜</span>
                <br>裡的綠色風暴
            </h1>
            <p class="hero__slogan">
                -CHASE THE AURORA-
            </p>
            <p class="hero__desc">
                從冰島火山到芬蘭雪林，從挪威峽灣到瑞典拉普蘭。<br>
                Aurora Travel 用 12 年的極地經驗，帶你走進一場一生一次的極光旅行。
            </p>
            <div class="hero__actions">
                <a href="#destinations" class="btn btn-primary">
                    <i class="ti ti-map-pin"></i>探索目的地
                </a>
                <a href="#featured-tours" class="btn hero__btn-outline">
                    <i class="ti ti-map-2"></i>觀看行程
                </a>
            </div>
            <div class="hero__features">
                <article class="feature-card">
                    <div class="feature-card__icon">
                        <i class="ti ti-stars"></i>
                    </div>
                    <div class="feature-card__content">
                        <h3 class="feature-card__title">
                            97% 極光遇見率
                        </h3>
                        <p class="feature-card__desc">
                            10 年 KP 數據追蹤
                        </p>
                    </div>
                </article>

                <article class="feature-card">
                    <div class="feature-card__icon">
                        <i class="ti ti-users-group"></i>
                    </div>
                    <div class="feature-card__content">
                        <h3 class="feature-card__title">
                            小團 8 人旅行
                        </h3>
                        <p class="feature-card__desc">
                            資深極地領隊帶隊
                        </p>
                    </div>
                </article>

                <article class="feature-card">
                    <div class="feature-card__icon">
                        <i class="ti ti-building-cottage"></i>
                    </div>
                    <div class="feature-card__content">
                        <h3 class="feature-card__title">
                            精選極光旅宿
                        </h3>
                        <p class="feature-card__desc">
                            玻璃屋・冰旅館・小木屋
                        </p>
                    </div>
                </article>

                <article class="feature-card">
                    <div class="feature-card__icon">
                        <i class="ti ti-headset"></i>
                    </div>
                    <div class="feature-card__content">
                        <h3 class="feature-card__title">
                            行前 24H 支援
                        </h3>
                        <p class="feature-card__desc">
                            極光預報即時通知
                        </p>
                    </div>
                </article>
            </div>
        </div>
    </section>

</body>
